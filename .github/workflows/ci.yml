name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
        working-directory: apps/api

      - name: Seed API database
        run: python -m app.db.seed
        working-directory: apps/api
        env:
          DATABASE_URL: sqlite:///./ci_convocaradar.db
          BOOTSTRAP_SOURCES_ON_STARTUP: "false"

      - name: Start API
        run: uvicorn app.main:app --host 127.0.0.1 --port 8000 &
        working-directory: apps/api
        env:
          DATABASE_URL: sqlite:///./ci_convocaradar.db
          BOOTSTRAP_SOURCES_ON_STARTUP: "false"

      - name: Install web dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Build web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api/v1

      - name: Start web
        run: npm run start -- --hostname 127.0.0.1 --port 3001 &
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api/v1

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health && curl -sf http://127.0.0.1:3001/login && exit 0
            sleep 2
          done
          exit 1

      - name: Playwright E2E
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3001
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api/v1

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Test
        run: python -m pytest

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/worker/pyproject.toml

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Test
        run: python -m pytest
