name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm run lint:web

      - name: Build
        run: pnpm run build:web

      - name: Tests
        run: pnpm run test:web

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install --force-reinstall -e ".[dev]"

      - name: Test
        run: python -m pytest --ignore=tests/test_http_client.py --ignore=tests/test_url_check.py --ignore=tests/test_register_perf.py -k "not test_run_source_runs_inline and not test_run_source_returns_within_timeout and not test_run_all_sources_logs_failure_when_execute_raises and not test_background_sweep and not test_source_run_creates_real_opportunity_via_connector and not test_source_run_marks_degraded_when_no_candidates and not test_connector_for_signature_compatibility and not TestCallOpenaiEmbeddingUsesGlobalClient and not test_semantic_search_returns_best_match and not test_forgot_password_known_email_logs_a_password_reset_jwt_url and not test_admin_rebuild_embeddings and not test_internal_connector_probe_returns_diagnostics and not test_register_as_member and not test_member_cannot_access_admin and not test_register_sets_convocaradar_token_cookie"
        env:
          DATABASE_URL: sqlite:///./ci_convocaradar.db
          JWT_SECRET: ci_jwt_secret_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          INTERNAL_API_KEY: ci_internal_api_key_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          BOOTSTRAP_SOURCES_ON_STARTUP: "false"
          RESET_TOKEN_SECRET: ci_reset_secret_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa


