name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
        working-directory: apps/api

      - name: Seed API database
        run: |
          python -m app.db.seed
          # Also create the local admin user — seed() only creates the
          # org + sources; seed_admin is the explicit step for users.
          E2E_ADMIN_PW=ConvocaRadarLocal123! \
            python -m app.db.seed_admin \
            --email admin@convocaradar.io \
            --password-env E2E_ADMIN_PW
        working-directory: apps/api
        env:
          DATABASE_URL: sqlite:///./ci_convocaradar.db
          BOOTSTRAP_SOURCES_ON_STARTUP: "false"
          # Tier 1 hardening: Settings refuses to start without these.
          JWT_SECRET: ci_jwt_secret_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          INTERNAL_API_KEY: ci_internal_api_key_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          E2E_ADMIN_PW: ConvocaRadarLocal123!

      - name: Start API
        run: uvicorn app.main:app --host 127.0.0.1 --port 8000 &
        working-directory: apps/api
        env:
          DATABASE_URL: sqlite:///./ci_convocaradar.db
          BOOTSTRAP_SOURCES_ON_STARTUP: "false"
          JWT_SECRET: ci_jwt_secret_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          INTERNAL_API_KEY: ci_internal_api_key_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa

      - name: Install web dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Build web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api/v1

      - name: Start web
        run: npm run start -- --hostname 127.0.0.1 --port 3001 &
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api/v1

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health && curl -sf http://127.0.0.1:3001/login && exit 0
            sleep 2
          done
          exit 1

      - name: Playwright E2E
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3001
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api/v1

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Test
        run: python -m pytest

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/worker/pyproject.toml

      # GAP-1 (dashboard-redesign): worker.tasks.bootstrap imports from
      # app.db.seed, app.db.session, app.models. Install the API as an
      # editable dep so those imports resolve in CI. Production deploys
      # already install the API via the worker Dockerfile.
      - name: Install API as worker dependency
        run: python -m pip install --upgrade pip && python -m pip install -e "../api[dev]"

      - name: Install worker dependencies
        run: python -m pip install -e ".[dev]"

      - name: Test
        run: python -m pytest
