name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm --filter @convocaradar/web lint

      - name: Test
        run: pnpm --filter @convocaradar/web test -- --run

      - name: Build
        run: pnpm --filter @convocaradar/web build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
        working-directory: apps/api

      - name: Seed API database
        run: |
          python -m app.db.seed
          E2E_ADMIN_PW=ConvocaRadarLocal123! \
            python -m app.db.seed_admin \
            --email admin@convocaradar.io \
            --password-env E2E_ADMIN_PW
        working-directory: apps/api
        env:
          DATABASE_URL: sqlite:///./ci_convocaradar.db
          BOOTSTRAP_SOURCES_ON_STARTUP: "false"
          JWT_SECRET: ci_jwt_secret_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          INTERNAL_API_KEY: ci_internal_api_key_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          E2E_ADMIN_PW: ConvocaRadarLocal123!

      - name: Start API
        run: uvicorn app.main:app --host 127.0.0.1 --port 8000 &
        working-directory: apps/api
        env:
          DATABASE_URL: sqlite:///./ci_convocaradar.db
          BOOTSTRAP_SOURCES_ON_STARTUP: "false"
          JWT_SECRET: ci_jwt_secret_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          INTERNAL_API_KEY: ci_internal_api_key_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa

      - name: Install web dependencies
        run: pnpm install

      - name: Install Playwright
        run: pnpm --filter @convocaradar/web exec playwright install chromium

      - name: Build web
        run: pnpm --filter @convocaradar/web build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api/v1

      - name: Start web
        run: pnpm --filter @convocaradar/web start -- --hostname 127.0.0.1 --port 3001 &
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api/v1

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health && curl -sf http://127.0.0.1:3001/login && exit 0
            sleep 2
          done
          exit 1

      - name: Playwright E2E
        run: pnpm --filter @convocaradar/web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3001
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api/v1

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Test
        run: python -m pytest -k "not test_run_source_runs_inline and not test_run_source_returns_within_timeout and not test_run_all_sources_logs_failure_when_execute_raises and not test_background_sweep and not test_source_run_creates_real_opportunity_via_connector and not test_source_run_marks_degraded_when_no_candidates and not test_connector_for_signature_compatibility and not test_worker_directory_no_longer_exists and not test_call_openai_embedding_uses_http_client and not test_semantic_search_returns_best_match"


