name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  RENDER_API_BASE: https://api.render.com/v1
  # convocaradar-api (the actual service the user tests, not the
  # historical convotracker-api which had a stale Dockerfile path)
  RENDER_API_SERVICE_ID_API: srv-d8vs7e1o3t8c73blhubg
  RENDER_PRODUCTION_URL: https://convocaradar-api.onrender.com
  VERCEL_PRODUCTION_URL: https://convocaradar-web.vercel.app

jobs:
  ci-status:
    # An explicit gate that fails the workflow when CI did not succeed.
    # The previous design used `if: ... github.event.workflow_run.conclusion == 'success'`
    # on each deploy job, which made them SKIP (and the workflow report
    # success) when CI failed. The deploy jobs now `need` this gate so
    # the workflow correctly fails when CI is red.
    #
    # Note: CI has pre-existing flaky tests that fail non-deterministically.
    # workflow_dispatch bypasses this gate so production can still be deployed
    # while the flaky tests are being fixed.
    name: Check CI status
    if: ${{ github.event_name == 'workflow_run' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate CI conclusion
        run: |
          conclusion="${{ github.event.workflow_run.conclusion }}"
          echo "CI workflow conclusion: ${conclusion}"
          if [ "${conclusion}" != "success" ]; then
            echo "::error::CI did not succeed (${conclusion}). Skipping deploy."
            exit 1
          fi
          echo "CI passed — proceeding to deploy."

  render-api:
    name: Deploy API to Render
    needs: ci-status
    runs-on: ubuntu-latest
    steps:
      - name: Trigger API redeploy via Render API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ env.RENDER_API_SERVICE_ID_API }}
        run: |
          echo "Triggering Render API redeploy for service ${SERVICE_ID}..."
          response=$(curl -sS -o /tmp/render-api-response.txt -w "%{http_code}" \
            -X POST "${RENDER_API_BASE}/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"clearCache":"clear"}')
          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "Render API deploy accepted (HTTP ${response})"
            head -c 500 /tmp/render-api-response.txt
            echo
          else
            echo "::error::Render API deploy failed (HTTP ${response})"
            head -c 500 /tmp/render-api-response.txt
            echo
            exit 1
          fi

  vercel:
    name: Deploy to Vercel
    needs: ci-status
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Vercel (production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./apps/web
          vercel-args: '--prod --yes'
          github-comment: false
          # The action runs `git log -1 --pretty=format:%B` from the working
          # directory to grab the commit message. In a monorepo that
          # directory has no .git, so we pass the message explicitly.
          github-message: ${{ github.event.head_commit.message }}
          github-sha: ${{ github.event.head_commit.id }}

  healthcheck:
    name: Post-deploy healthcheck
    needs: [ci-status, render-api, vercel]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployments to settle
        run: sleep 30

      - name: Healthcheck Render API
        run: |
          echo "Checking ${RENDER_PRODUCTION_URL}/api/v1/health ..."
          for i in $(seq 1 30); do
            if curl -sf -m 10 "${RENDER_PRODUCTION_URL}/api/v1/health"; then
              echo "Render API healthy after $((i*5))s"
              exit 0
            fi
            echo "  attempt $i: not healthy yet, retrying in 5s"
            sleep 5
          done
          echo "::error::Render API healthcheck failed after 150s"
          exit 1

      - name: Healthcheck Vercel
        run: |
          echo "Checking ${VERCEL_PRODUCTION_URL}/login ..."
          for i in $(seq 1 30); do
            code=$(curl -sS -o /dev/null -m 10 -w "%{http_code}" "${VERCEL_PRODUCTION_URL}/login" || echo "000")
            case "$code" in
              200|301|302|307|308)
                echo "Vercel healthy (HTTP ${code}) after $((i*5))s"
                exit 0
                ;;
            esac
            echo "  attempt $i: HTTP ${code}, retrying in 5s"
            sleep 5
          done
          echo "::error::Vercel healthcheck failed after 150s"
          exit 1
