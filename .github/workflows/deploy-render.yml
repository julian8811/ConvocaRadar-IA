name: Deploy Render

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  RENDER_API_SERVICE_ID: srv-d6qovo75r7bs738lipj0

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy API via hook or Render API
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_API_DEPLOY_HOOK }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ env.RENDER_API_SERVICE_ID }}
        run: bash scripts/trigger-render-deploy.sh "API" "$DEPLOY_HOOK" "$RENDER_API_KEY" "$SERVICE_ID" true

      - name: Deploy worker via hook
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_WORKER_DEPLOY_HOOK }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_WORKER_SERVICE_ID }}
        run: bash scripts/trigger-render-deploy.sh "worker" "$DEPLOY_HOOK" "$RENDER_API_KEY" "$SERVICE_ID" false

      - name: Deploy worker beat via hook
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_WORKER_BEAT_DEPLOY_HOOK }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_WORKER_BEAT_SERVICE_ID }}
        run: bash scripts/trigger-render-deploy.sh "worker-beat" "$DEPLOY_HOOK" "$RENDER_API_KEY" "$SERVICE_ID" false
