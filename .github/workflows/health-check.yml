name: Source URL Health Check

on:
  schedule:
    # Run daily at 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  check-urls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run source health check
        id: health
        continue-on-error: true
        run: |
          python scripts/check_sources_health.py --json > /tmp/health-report.json 2>/tmp/health-check-err.log

      - name: Summarize results
        id: summary
        shell: python3 {0}
        run: |
          import json, os
          with open('/tmp/health-report.json') as f:
              data = json.load(f)
          total = data['total']
          ok = data['ok']
          broken = data['broken']
          pct = round((ok / total) * 100) if total > 0 else 0
          github_output = os.environ.get('GITHUB_OUTPUT', '/dev/null')
          with open(github_output, 'a') as out:
              out.write(f'total={total}\n')
              out.write(f'ok={ok}\n')
              out.write(f'broken={broken}\n')
              out.write(f'pct={pct}\n')

      - name: Create issue on broken sources
        if: steps.summary.outputs.broken != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/health-report.json', 'utf8'));
            const broken = report.sources.filter(s => s.classification !== 'OK');
            
            let body = `## ⚠️ Source Health Check Report\n\n`;
            body += `**${broken.length} of ${report.total} sources are unreachable** (${report.ok} OK)\n\n`;
            body += `| Source | Status | Detail |\n`;
            body += `|--------|--------|--------|\n`;
            for (const s of broken) {
              body += `| ${s.key} | ${s.classification} | ${s.error || s.status || 'unknown'} |\n`;
            }
            body += `\n_Generated by daily health-check workflow._\n`;
            
            // Check if an issue already exists for this
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['health-check']
            });
            
            if (issues.data.length > 0) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: body,
                title: `⚠️ ${broken.length} fuentes inaccesibles (${new Date().toISOString().split('T')[0]})`
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `⚠️ ${broken.length} fuentes inaccesibles (${new Date().toISOString().split('T')[0]})`,
                body: body,
                labels: ['health-check']
              });
            }
