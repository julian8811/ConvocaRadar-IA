name: keep-alive

# PR6: keep Render Free service awake.
#
# Render's free tier spins down web services after 15 minutes of
# inactivity. Cold starts take 30-60s and cause "signal is aborted"
# errors on the frontend.
#
# Pinging the API's ``/api/v1/health`` endpoint every 14 minutes keeps
# the service warm. The 14-minute cadence is intentionally one minute
# under Render's 15-minute sleep threshold so we never lose the race.
#
# Secret: BACKEND_URL (e.g. https://convocaradar-ia.onrender.com).
# This is set in the GitHub repo's Settings → Secrets → Actions.
# ``--max-time 10`` caps the curl so a slow Render response never
# blocks the runner.
#
# No issue-creation step — the goal is silent liveness. If the curl
# fails, the cron still runs the next interval; persistent failures
# show up in the Actions tab.

on:
  schedule:
    - cron: "*/14 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "::error::BACKEND_URL secret is not set; skipping ping."
            exit 1
          fi
          curl -fsS "$BACKEND_URL/api/v1/health" --max-time 10
