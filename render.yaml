services:
  # ── API (Python native on Render, NOT Docker) ──────────────────────────
  # Initial setup was done via Render Dashboard as a Python web service.
  # This config is for reference; actual service lives at:
  #   https://dashboard.render.com/web/srv-d938h6m7r5hc73bo7u00
  # Build: pip install -r requirements.txt && python -m playwright install chromium chromium-headless-shell --with-deps
  # Start: uvicorn app.main:app --host 0.0.0.0 --port $PORT
  # ───────────────────────────────────────────────────────────────────────
  - type: web
    name: convocaradar-api
    env: python
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium chromium-headless-shell
    startCommand: ./start.sh
    plan: free
    autoDeploy: true
    healthCheckPath: /api/v1/health/live
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: ConvocaRadar IA
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: BACKEND_URL
        value: https://convocaradar-ia.onrender.com
      - key: FRONTEND_URL
        value: https://convocaradar-web.vercel.app
      - key: STORAGE_BACKEND
        value: local
      - key: STORAGE_DIR
        value: ./storage
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_API_BASE
        value: https://api.groq.com/openai/v1
      - key: CHAT_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: ""
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: resend
      - key: SMTP_FROM
        value: ConvocaRadar IA <onboarding@resend.dev>
      - key: SMTP_USE_TLS
        value: "true"
