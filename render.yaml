services:
  - type: web
    name: convocaradar-api
    env: docker
    rootDir: .
    dockerfilePath: apps/api/Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: ConvocaRadar IA
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: BACKEND_URL
        value: https://convocaradar-api.onrender.com
      - key: FRONTEND_URL
        value: https://convocaradar-web.vercel.app
      - key: STORAGE_BACKEND
        value: local
      - key: STORAGE_DIR
        value: ./storage
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_API_BASE
        value: https://api.groq.com/openai/v1
      - key: CHAT_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: ""
      - key: SMTP_HOST
        value: ""
