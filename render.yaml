services:
  - type: web
    name: convocaradar-api
    env: docker
    rootDir: .
    dockerfilePath: apps/api/Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: ConvocaRadar IA
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: BACKEND_URL
        value: https://convocaradar-api.onrender.com
      - key: FRONTEND_URL
        value: https://convocaradar-web.vercel.app
      - key: STORAGE_BACKEND
        value: local
      - key: STORAGE_DIR
        value: ./storage
      - key: SCRAPING_EXECUTION_MODE
        value: inline
      - key: USE_WORKER
        value: "false"
      - key: BOOTSTRAP_SOURCES_ON_STARTUP
        value: "true"
      - key: BOOTSTRAP_SOURCES_BLOCKING
        value: "false"
      - key: LLM_PROVIDER
        value: mock
      - key: SMTP_HOST
        value: ""
