[project]
name = "convocaradar-worker"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "celery>=5.4.0",
  "redis>=5.0.8",
  "httpx>=0.27.0",
  "pydantic>=2.8.0",
  "pydantic-settings>=2.4.0",
  "sqlalchemy>=2.0.32",
  "psycopg[binary]>=3.2.1",
  "selectolax>=0.3.21",
  "python-dateutil>=2.9.0",
  "tenacity>=8.5.0"
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.2",
  "pytest-asyncio>=0.23.8"
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
